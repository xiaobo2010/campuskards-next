services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: campuskards
      POSTGRES_USER: ck
      POSTGRES_PASSWORD: devpassword
    ports:
      - "5432:5432"
    volumes:
      - dev_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile.dev
    ports:
      - "8000:8000"
    env_file: ../../.env
    volumes:
      - ../../backend:/app
      - backend_venv:/app/.venv
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ../../frontend:/app
      - frontend_node_modules:/app/node_modules
    command: pnpm dev
    depends_on:
      - backend

volumes:
  dev_pgdata:
  backend_venv:
  frontend_node_modules:
